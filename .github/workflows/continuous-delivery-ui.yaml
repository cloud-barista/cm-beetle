# This workflow performs continuous delivery (CD) for the CM-Beetle UI.
# Builds and publishes the Next.js UI container image to Docker Hub and GHCR.
# Triggered on pushes to main or semver tags that touch the ui/ directory.
name: Continuous Delivery - UI (CD)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "ui/**"
      - ".github/workflows/continuous-delivery-ui.yaml"
  # workflow_dispatch:

env:
  DOCKER_REGISTRY_NAME: cloudbaristaorg
  GHCR_REGISTRY_NAME: ${{ github.repository_owner }}
  IMAGE_NAME: ${{ github.event.repository.name }}-ui

jobs:
  publish-ui-container-image:
    name: Publish UI container image

    if: github.repository_owner == 'cloud-barista'

    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Extract metadata from Git reference and GitHub events
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.GHCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,enable=true,pattern={{version}}
            type=edge,enable=true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v6
        with:
          path: /tmp/.buildx-cache-ui
          key: ${{ runner.os }}-buildx-ui-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-ui-

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and publish
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./ui
          file: ./ui/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=local,src=/tmp/.buildx-cache-ui
          cache-to: type=local,dest=/tmp/.buildx-cache-ui

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
